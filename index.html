<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Рандомайзер | Два кубика +/– | vMix Ready</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: transparent !important;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 950px;
            padding: 20px;
            background: transparent;
            z-index: 10;
        }

        .dice-panel {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 4rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            perspective: 1200px;
        }

        .dice-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .dice {
            width: 180px;
            height: 180px;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .face {
            position: absolute;
            width: 180px;
            height: 180px;
            background: rgba(25, 25, 40, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            border: 2px solid rgba(255, 200, 50, 0.85);
            box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 12px rgba(255,220,100,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 800;
            color: #ffdf99;
            text-shadow: 0 0 10px #ffaa33;
            font-family: monospace;
        }

        .front  { transform: translateZ(90px); background: rgba(20,20,38,0.96);}
        .back   { transform: rotateY(180deg) translateZ(90px); background: rgba(20,20,38,0.96);}
        .right  { transform: rotateY(90deg) translateZ(90px); background: rgba(20,20,38,0.96);}
        .left   { transform: rotateY(-90deg) translateZ(90px); background: rgba(20,20,38,0.96);}
        .top    { transform: rotateX(90deg) translateZ(90px); background: rgba(20,20,38,0.96);}
        .bottom { transform: rotateX(-90deg) translateZ(90px); background: rgba(20,20,38,0.96);}

        .dice-label {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 6px 20px;
            border-radius: 60px;
            color: #ffcd7e;
            border: 1px solid rgba(255,200,100,0.6);
            letter-spacing: 1px;
        }

        /* Блок с кнопками + и - */
        .control-buttons {
            display: flex;
            gap: 20px;
            margin-top: 5px;
            justify-content: center;
        }

        .step-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border: 2px solid #ffb347;
            color: #ffdd99;
            font-size: 2rem;
            font-weight: bold;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px rgba(0,0,0,0.5);
            font-family: monospace;
        }

        .step-btn:hover {
            background: #ffb347;
            color: #1e1e2a;
            transform: scale(1.07);
            border-color: #ffdd99;
        }

        .step-btn:active {
            transform: scale(0.94);
        }

        .range-hint {
            font-size: 1.5rem;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(16px);
            padding: 12px 32px;
            border-radius: 80px;
            margin-bottom: 25px;
            color: #ffdd99;
            font-weight: bold;
            border: 1px solid #ffb347;
            text-align: center;
        }

        .range-hint span {
            font-size: 2rem;
            font-weight: 900;
            color: #ffaa44;
            background: #00000066;
            padding: 0 14px;
            border-radius: 40px;
            margin: 0 4px;
        }

        .action-btn {
            background: linear-gradient(95deg, #e04e2a, #ff6a3d);
            border: none;
            padding: 14px 48px;
            font-size: 1.9rem;
            font-weight: bold;
            color: white;
            border-radius: 70px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 80, 40, 0.7);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            letter-spacing: 4px;
            margin-top: 10px;
        }

        .action-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(255, 100, 40, 0.9);
        }
        .action-btn:active { transform: scale(0.97); }

        /* Оверлей результата */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            background: transparent;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .result-card {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(28px);
            border-radius: 70px;
            padding: 20px 55px;
            text-align: center;
            border: 3px solid #ffaa55;
            box-shadow: 0 0 70px rgba(0,0,0,0.6);
        }

        .result-digit {
            font-size: 8rem;
            font-weight: 900;
            font-family: monospace;
            color: #ffd966;
            text-shadow: 0 0 20px #ff8800;
            letter-spacing: 8px;
        }

        .result-range-info {
            font-size: 1.3rem;
            color: #ffc285;
            margin-top: 10px;
        }

        /* Искры */
        .spark-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
            opacity: 0;
        }

        .dice.shrink {
            transform: scale(0) rotate(720deg);
            opacity: 0;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
        }

        @media (max-width: 750px) {
            .dice-panel { gap: 2rem; }
            .dice { width: 130px; height: 130px; }
            .face { width: 130px; height: 130px; font-size: 3.6rem; }
            .front  { transform: translateZ(65px); }
            .back   { transform: rotateY(180deg) translateZ(65px); }
            .right  { transform: rotateY(90deg) translateZ(65px); }
            .left   { transform: rotateY(-90deg) translateZ(65px); }
            .top    { transform: rotateX(90deg) translateZ(65px); }
            .bottom { transform: rotateX(-90deg) translateZ(65px); }
            .result-digit { font-size: 4.2rem; }
            .result-card { padding: 12px 28px; }
            .action-btn { font-size: 1.5rem; padding: 10px 36px; }
            .range-hint { font-size: 1.1rem; }
            .range-hint span { font-size: 1.6rem; }
            .step-btn { width: 48px; height: 48px; font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<div class="container" id="appContainer">
    <div class="range-hint" id="rangeHint">
        🎲 ДИАПАЗОН: от 0 до <span id="maxRangeSpan">99</span>
    </div>
    <div class="dice-panel">
        <!-- Кубик 1 (десятки) -->
        <div class="dice-wrapper">
            <div class="dice" id="diceTens">
                <div class="face front">0</div>
                <div class="face back">1</div>
                <div class="face right">2</div>
                <div class="face left">3</div>
                <div class="face top">4</div>
                <div class="face bottom">5</div>
            </div>
            <div class="dice-label">ДЕСЯТКИ: <span id="tensValue">0</span></div>
            <div class="control-buttons">
                <button class="step-btn" id="tensMinus">–</button>
                <button class="step-btn" id="tensPlus">+</button>
            </div>
        </div>
        <!-- Кубик 2 (единицы) -->
        <div class="dice-wrapper">
            <div class="dice" id="diceUnits">
                <div class="face front">0</div>
                <div class="face back">1</div>
                <div class="face right">2</div>
                <div class="face left">3</div>
                <div class="face top">4</div>
                <div class="face bottom">5</div>
            </div>
            <div class="dice-label">ЕДИНИЦЫ: <span id="unitsValue">0</span></div>
            <div class="control-buttons">
                <button class="step-btn" id="unitsMinus">–</button>
                <button class="step-btn" id="unitsPlus">+</button>
            </div>
        </div>
    </div>
    <button class="action-btn" id="rollBtn">Поехали!</button>
</div>

<!-- Оверлей результата -->
<div class="result-overlay" id="resultOverlay">
    <div class="result-card">
        <div class="result-digit" id="finalResultNumber">0</div>
        <div class="result-range-info" id="resultRangeText"></div>
    </div>
</div>

<canvas id="sparkCanvas" class="spark-canvas"></canvas>

<script>
    (function(){
        // ------ DOM элементы ------
        const diceTens = document.getElementById('diceTens');
        const diceUnits = document.getElementById('diceUnits');
        const tensSpan = document.getElementById('tensValue');
        const unitsSpan = document.getElementById('unitsValue');
        const maxRangeSpan = document.getElementById('maxRangeSpan');
        const rollBtn = document.getElementById('rollBtn');
        const resultOverlay = document.getElementById('resultOverlay');
        const finalResultSpan = document.getElementById('finalResultNumber');
        const resultRangeText = document.getElementById('resultRangeText');
        const sparkCanvas = document.getElementById('sparkCanvas');
        const ctx = sparkCanvas.getContext('2d');
        
        // Кнопки +/-
        const tensPlus = document.getElementById('tensPlus');
        const tensMinus = document.getElementById('tensMinus');
        const unitsPlus = document.getElementById('unitsPlus');
        const unitsMinus = document.getElementById('unitsMinus');

        // ----- Значения кубиков (0..9) -----
        let tensDigit = 0;   // десятки
        let unitsDigit = 0;   // единицы

        // Функция обновления граней куба (последовательные цифры от startDigit)
        function updateDiceFaces(diceElement, startDigit) {
            const digits = [];
            for(let i=0; i<6; i++) {
                let val = (startDigit + i) % 10;
                digits.push(val);
            }
            const faces = diceElement.querySelectorAll('.face');
            if(faces.length === 6) {
                faces[0].innerText = digits[0]; // front
                faces[1].innerText = digits[1]; // back
                faces[2].innerText = digits[2]; // right
                faces[3].innerText = digits[3]; // left
                faces[4].innerText = digits[4]; // top
                faces[5].innerText = digits[5]; // bottom
            }
        }

        // Обновить отображение диапазона (двузначное число)
        function updateRangeDisplay() {
            let maxVal = tensDigit * 10 + unitsDigit;
            maxRangeSpan.innerText = maxVal;
            tensSpan.innerText = tensDigit;
            unitsSpan.innerText = unitsDigit;
        }

        // Независимое обновление для десятков
        function setTensValue(newVal) {
            if(newVal < 0) newVal = 0;
            if(newVal > 9) newVal = 9;
            if(tensDigit !== newVal) {
                tensDigit = newVal;
                updateDiceFaces(diceTens, tensDigit);
                updateRangeDisplay();
                // небольшая анимация "подпрыгивания" для тактильного отклика
                diceTens.style.transform = 'scale(0.98)';
                setTimeout(() => { if(diceTens) diceTens.style.transform = ''; }, 120);
            }
        }

        function setUnitsValue(newVal) {
            if(newVal < 0) newVal = 0;
            if(newVal > 9) newVal = 9;
            if(unitsDigit !== newVal) {
                unitsDigit = newVal;
                updateDiceFaces(diceUnits, unitsDigit);
                updateRangeDisplay();
                diceUnits.style.transform = 'scale(0.98)';
                setTimeout(() => { if(diceUnits) diceUnits.style.transform = ''; }, 120);
            }
        }

        // Инициализация
        updateDiceFaces(diceTens, tensDigit);
        updateDiceFaces(diceUnits, unitsDigit);
        updateRangeDisplay();

        // ----- Обработчики кнопок + и - (основной способ) -----
        tensPlus.addEventListener('click', () => setTensValue(tensDigit + 1));
        tensMinus.addEventListener('click', () => setTensValue(tensDigit - 1));
        unitsPlus.addEventListener('click', () => setUnitsValue(unitsDigit + 1));
        unitsMinus.addEventListener('click', () => setUnitsValue(unitsDigit - 1));

        // Дополнительно оставляем поддержку колесика мыши (для десктопа, но в vMix может не работать — на всякий случай)
        function attachWheel(diceElem, isTens) {
            diceElem.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 1 : -1;
                if(isTens) {
                    let newVal = tensDigit + delta;
                    if(newVal >= 0 && newVal <= 9) setTensValue(newVal);
                } else {
                    let newVal = unitsDigit + delta;
                    if(newVal >= 0 && newVal <= 9) setUnitsValue(newVal);
                }
            }, { passive: false });
        }
        attachWheel(diceTens, true);
        attachWheel(diceUnits, false);

        // ---------- Система искр (взрыв) ----------
        let sparkActive = false;
        let sparkAnimId = null;
        let particles = [];

        function resizeSparkCanvas() {
            sparkCanvas.width = window.innerWidth;
            sparkCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeSparkCanvas);
        resizeSparkCanvas();

        function createFireworks() {
            const count = 220;
            particles = [];
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * sparkCanvas.width,
                    y: Math.random() * sparkCanvas.height,
                    radius: Math.random() * 6 + 2,
                    vx: (Math.random() - 0.5) * 14,
                    vy: (Math.random() - 0.5) * 14 - 2,
                    alpha: Math.random() * 0.9 + 0.3,
                    color: `hsl(${Math.random() * 50 + 15}, 100%, 60%)`,
                    life: 1,
                    decay: 0.018 + Math.random() * 0.025
                });
            }
        }

        function drawSparks() {
            if(!sparkActive) return;
            ctx.clearRect(0, 0, sparkCanvas.width, sparkCanvas.height);
            let anyAlive = false;
            for(let i=0; i<particles.length; i++) {
                const p = particles[i];
                if(p.life <= 0) continue;
                anyAlive = true;
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                p.alpha = p.life * 0.9;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#ffaa44";
            }
            if(!anyAlive) {
                sparkActive = false;
                if(sparkAnimId) cancelAnimationFrame(sparkAnimId);
                sparkCanvas.style.opacity = "0";
                ctx.clearRect(0,0,sparkCanvas.width, sparkCanvas.height);
                return;
            }
            sparkAnimId = requestAnimationFrame(drawSparks);
        }

        function startSparks() {
            if(sparkAnimId) cancelAnimationFrame(sparkAnimId);
            resizeSparkCanvas();
            createFireworks();
            sparkActive = true;
            sparkCanvas.style.opacity = "1";
            drawSparks();
        }

        // ----- Хаотичное вращение кубиков -----
        function chaoticSpin(diceElem, durationMs) {
            return new Promise((resolve) => {
                const start = performance.now();
                const interval = setInterval(() => {
                    const now = performance.now();
                    if(now - start >= durationMs) {
                        clearInterval(interval);
                        diceElem.style.transform = '';
                        resolve();
                        return;
                    }
                    const rx = Math.random() * 360;
                    const ry = Math.random() * 360;
                    const rz = Math.random() * 360;
                    diceElem.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;
                }, 40);
            });
        }

        // ----- Анимация рулетки на финальном числе -----
        async function animateResultNumber(finalNumber, maxRangeValue) {
            resultOverlay.style.opacity = "1";
            const steps = 22;
            for(let i=0; i<=steps; i++) {
                const fakeNum = Math.floor(Math.random() * (maxRangeValue + 1));
                finalResultSpan.innerText = fakeNum;
                resultRangeText.innerText = `диапазон 0 … ${maxRangeValue}`;
                await new Promise(r => setTimeout(r, 55));
            }
            finalResultSpan.innerText = finalNumber;
        }

        // ----- Генерация случайного числа [0 .. maxLimit] -----
        function getRandomInRange(maxLimit) {
            if(maxLimit === 0) return 0;
            return Math.floor(Math.random() * (maxLimit + 1));
        }

        // ----- Состояние анимации -----
        let isAnimating = false;

        // Основной розыгрыш (без автоматического сброса)
        async function performRoll() {
            if(isAnimating) return;
            isAnimating = true;
            rollBtn.disabled = true;
            
            // 1) Искры
            startSparks();
            
            // 2) Кубики хаотично вращаются
            await Promise.all([
                chaoticSpin(diceTens, 520),
                chaoticSpin(diceUnits, 520)
            ]);
            
            // 3) Исчезновение кубиков (уменьшение)
            diceTens.classList.add('shrink');
            diceUnits.classList.add('shrink');
            // скрываем лейблы и кнопки управления для чистоты
            document.querySelectorAll('.dice-label, .control-buttons').forEach(el => el.style.opacity = "0");
            await new Promise(r => setTimeout(r, 400));
            diceTens.style.visibility = 'hidden';
            diceUnits.style.visibility = 'hidden';
            
            // 4) Определяем максимальное число (десятки*10+единицы)
            let maxLimit = tensDigit * 10 + unitsDigit;
            const randomValue = getRandomInRange(maxLimit);
            
            // 5) Анимация финальной цифры
            await animateResultNumber(randomValue, maxLimit);
            
            // Меняем текст кнопки на "Еще?"
            rollBtn.innerText = "Еще?";
            rollBtn.disabled = false;
            isAnimating = false;
        }
        
        // Сброс интерфейса до состояния "кубики видны, результат скрыт"
        async function resetToDiceMode() {
            if(isAnimating) return;
            // Прячем оверлей
            resultOverlay.style.opacity = "0";
            // Восстанавливаем кубики
            diceTens.classList.remove('shrink');
            diceUnits.classList.remove('shrink');
            diceTens.style.visibility = 'visible';
            diceUnits.style.visibility = 'visible';
            diceTens.style.transform = '';
            diceUnits.style.transform = '';
            // Возвращаем видимость подписей и кнопок
            document.querySelectorAll('.dice-label, .control-buttons').forEach(el => el.style.opacity = "1");
            // Перерисовываем грани в актуальных значениях
            updateDiceFaces(diceTens, tensDigit);
            updateDiceFaces(diceUnits, unitsDigit);
            rollBtn.innerText = "Поехали!";
        }
        
        // Гибкий обработчик кнопки:
        // - Если сейчас виден результат (оверлей) -> нажимаем "Еще?" -> сброс в режим кубиков
        // - Если кубики видны и результат скрыт -> запускаем розыгрыш
        async function onMainButtonClick() {
            if(isAnimating) return;
            const isResultVisible = (resultOverlay.style.opacity === "1");
            if(isResultVisible) {
                // Режим "Еще?" — просто сбрасываем до кубиков, не запуская розыгрыш автоматически
                await resetToDiceMode();
            } else {
                // Режим "Поехали!" — запускаем полный розыгрыш
                await performRoll();
            }
        }
        
        rollBtn.addEventListener('click', onMainButtonClick);
        
        // Дополнительная безопасность: если вдруг после performRoll кнопка "Еще?" и пользователь хочет изменить значения,
        // он нажимает "Еще?" → кубики появляются, кнопка меняется на "Поехали!", можно крутить +/-, потом снова "Поехали!".
        // Идеально соответствует заданию.
        
        // Также при сбросе убедимся, что случайно не осталось скрытых элементов
        window.resetToDiceMode = resetToDiceMode;
        
        // Небольшой фикс для vMix: гарантировать прозрачность при любых раскладах
        document.body.style.backgroundColor = 'transparent';
        
        // Если пользователь захочет повторно использовать колесико после сброса — всё ок, кнопки +\- всегда активны.
        console.log("Рандомайзер готов. Десятки и единицы задают максимальное число. Кнопки +/- работают отлично!");
    })();
</script>
</body>
</html>
